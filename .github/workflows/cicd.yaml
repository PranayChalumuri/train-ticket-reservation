name: CI/CD Pipeline to Deploy to Tomcat

on: 
  push:
    branches: [ master ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to latest
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4  # Updated to latest
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Cache Maven packages  # Speed up builds
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Validate with Maven
        run: mvn validate
      
      - name: Compile with Maven
        run: mvn compile
      
      - name: Test with Maven
        run: mvn test
      
      - name: Package with Maven  # Creates target/*.war
        run: mvn clean package -DskipTests  # Skip tests for faster deploys
      
      - name: Verify WAR file  # FIXED: Check root target/
        run: ls -lh target/

      - name: Deploy to Tomcat
        run: |
         WAR_FILE=$(ls target/*.war | head -1)
         echo "Deploying $WAR_FILE to http://${{ secrets.TOMCAT_HOST }}"
         curl -v -u ${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }} \
         -T "$WAR_FILE" \
         --max-time 60 \
         "http://${{ secrets.TOMCAT_HOST }}/manager/text/deploy?path=/MyWebApp&update=true"



        
