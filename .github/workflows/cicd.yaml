name: CI/CD Deploy to Tomcat
on:
  push:
    branches:
      - master
  workflow_dispatch:  # Allow manual triggers

jobs:
  # BUILD JOB - Compile and package the application
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build WAR
        run: mvn clean package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: train-ticket-app
          path: target/*.war

  # DEPLOY TO DEVELOPMENT
  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: 
      name: DEV
      url: http://${{ secrets.DEV_HOST }}:8080
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: train-ticket-app

      - name: Deploy to DEV Server
        run: |
          curl -u ${{ secrets.DEV_USER }}:${{ secrets.DEV_PASSWORD }} \
            --upload-file *.war \
            "http://${{ secrets.DEV_HOST }}:8080/manager/text/deploy?path=/myapp&update=true"

  # DEPLOY TO TEST (requires manual approval)
  deploy-test:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: 
      name: TEST
      url: http://${{ secrets.TEST_HOST }}:8080
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: train-ticket-app

      - name: Deploy to TEST Server
        run: |
          curl -u ${{ secrets.TEST_USER }}:${{ secrets.TEST_PASSWORD }} \
            --upload-file *.war \
            "http://${{ secrets.TEST_HOST }}:8080/manager/text/deploy?path=/myapp&update=true"

  # DEPLOY TO PRODUCTION (requires manual approval)
  deploy-prod:
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: 
      name: PROD
      url: http://${{ secrets.PROD_HOST }}:8080
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: train-ticket-app

      - name: Deploy to PROD Server
        run: |
          curl -u ${{ secrets.PROD_USER }}:${{ secrets.PROD_PASSWORD }} \
            --upload-file *.war \
            "http://${{ secrets.PROD_HOST }}:8080/manager/text/deploy?path=/myapp&update=true"
